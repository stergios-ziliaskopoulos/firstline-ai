<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FirstLine AI — Chat Widget</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom scrollbar for the message list */
    .chat-scroll::-webkit-scrollbar { width: 6px; }
    .chat-scroll::-webkit-scrollbar-track { background: transparent; }
    .chat-scroll::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
    .chat-scroll::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

    /* Smooth open/close animation */
    .chat-window {
      transform-origin: bottom right;
      transition: opacity 200ms ease, transform 200ms ease;
    }
    .chat-window.hidden-anim {
      opacity: 0;
      transform: scale(0.95) translateY(8px);
      pointer-events: none;
    }

    /* Typing dots */
    @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
    .typing-dot { animation: blink 1.4s infinite both; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center">

  <!-- Demo background content -->
  <div class="text-center px-6">
    <h1 class="text-3xl font-semibold tracking-tight text-zinc-100">FirstLine AI</h1>
    <p class="mt-2 text-zinc-400 max-w-md mx-auto">Floating chat widget demo. Click the button in the bottom-right corner to open the assistant.</p>
  </div>

  <!-- Chat widget root -->
  <div class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-3">

    <!-- Chat window -->
    <div id="chat-window" class="chat-window hidden-anim w-[360px] h-[520px] bg-zinc-900 border border-zinc-800 rounded-2xl shadow-2xl shadow-black/50 flex flex-col overflow-hidden">

      <!-- Header -->
      <div class="flex items-center justify-between px-4 py-3 border-b border-zinc-800 bg-zinc-900/80 backdrop-blur">
        <div class="flex items-center gap-2.5">
          <div class="relative">
            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-sm font-semibold">F</div>
            <span class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-emerald-500 border-2 border-zinc-900 rounded-full"></span>
          </div>
          <div>
            <div class="text-sm font-medium text-zinc-100 leading-tight">FirstLine Support</div>
            <div class="text-xs text-zinc-500 leading-tight">Usually replies instantly</div>
          </div>
        </div>
        <button id="close-btn" class="text-zinc-500 hover:text-zinc-200 transition" aria-label="Close chat">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <!-- Messages -->
      <div id="messages" class="chat-scroll flex-1 overflow-y-auto px-4 py-4 space-y-3"></div>

      <!-- Input -->
      <form id="chat-form" class="border-t border-zinc-800 bg-zinc-900 px-3 py-3 flex items-end gap-2">
        <textarea
          id="chat-input"
          rows="1"
          placeholder="Type your message…"
          class="flex-1 resize-none bg-zinc-800/60 text-sm text-zinc-100 placeholder-zinc-500 rounded-xl px-3 py-2.5 border border-zinc-700/60 focus:outline-none focus:border-indigo-500/60 focus:ring-1 focus:ring-indigo-500/40 max-h-32"
        ></textarea>
        <button
          type="submit"
          id="send-btn"
          class="shrink-0 w-10 h-10 rounded-xl bg-indigo-600 hover:bg-indigo-500 disabled:bg-zinc-700 disabled:cursor-not-allowed text-white flex items-center justify-center transition"
          aria-label="Send message"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </form>
    </div>

    <!-- Floating button -->
    <button
      id="open-btn"
      class="w-14 h-14 rounded-full bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-900/40 flex items-center justify-center transition hover:scale-105 active:scale-95"
      aria-label="Open chat"
    >
      <svg id="icon-open" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
  </div>

  <script>
    const WEBHOOK_URL = "https://unmarginated-unhomogeneously-reanna.ngrok-free.dev/webhook/firstline-chat";

    const openBtn  = document.getElementById("open-btn");
    const closeBtn = document.getElementById("close-btn");
    const chatWin  = document.getElementById("chat-window");
    const form     = document.getElementById("chat-form");
    const input    = document.getElementById("chat-input");
    const sendBtn  = document.getElementById("send-btn");
    const messages = document.getElementById("messages");

    let isOpen = false;
    let hasGreeted = false;

    function openChat() {
      chatWin.classList.remove("hidden-anim");
      isOpen = true;
      if (!hasGreeted) {
        addMessage("assistant", "Hi! I'm the FirstLine AI assistant. How can I help you today?");
        hasGreeted = true;
      }
      setTimeout(() => input.focus(), 200);
    }

    function closeChat() {
      chatWin.classList.add("hidden-anim");
      isOpen = false;
    }

    openBtn.addEventListener("click", () => isOpen ? closeChat() : openChat());
    closeBtn.addEventListener("click", closeChat);

    // Auto-grow textarea
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 128) + "px";
    });

    // Submit on Enter, newline on Shift+Enter
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    function addMessage(role, text) {
      const wrap = document.createElement("div");
      wrap.className = "flex " + (role === "user" ? "justify-end" : "justify-start");

      const bubble = document.createElement("div");
      bubble.className = role === "user"
        ? "max-w-[80%] bg-indigo-600 text-white text-sm rounded-2xl rounded-br-sm px-3.5 py-2 leading-relaxed whitespace-pre-wrap break-words"
        : "max-w-[80%] bg-zinc-800 text-zinc-100 text-sm rounded-2xl rounded-bl-sm px-3.5 py-2 leading-relaxed whitespace-pre-wrap break-words border border-zinc-700/50";
      bubble.textContent = text;

      wrap.appendChild(bubble);
      messages.appendChild(wrap);
      messages.scrollTop = messages.scrollHeight;
      return wrap;
    }

    function addTypingIndicator() {
      const wrap = document.createElement("div");
      wrap.className = "flex justify-start";
      wrap.id = "typing-indicator";
      wrap.innerHTML = `
        <div class="bg-zinc-800 border border-zinc-700/50 rounded-2xl rounded-bl-sm px-4 py-3 flex items-center gap-1">
          <span class="typing-dot w-1.5 h-1.5 rounded-full bg-zinc-400"></span>
          <span class="typing-dot w-1.5 h-1.5 rounded-full bg-zinc-400"></span>
          <span class="typing-dot w-1.5 h-1.5 rounded-full bg-zinc-400"></span>
        </div>`;
      messages.appendChild(wrap);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTypingIndicator() {
      const el = document.getElementById("typing-indicator");
      if (el) el.remove();
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      addMessage("user", text);
      input.value = "";
      input.style.height = "auto";
      sendBtn.disabled = true;
      addTypingIndicator();

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "ngrok-skip-browser-warning": "true"
          },
          body: JSON.stringify({ message: text })
        });

        removeTypingIndicator();

        if (!res.ok) {
          addMessage("assistant", `Sorry, something went wrong (HTTP ${res.status}). Please try again.`);
          return;
        }

        const data = await res.json().catch(() => null);
        const reply = data && typeof data.reply === "string" && data.reply.trim()
          ? data.reply
          : "I didn't get a response. Please try again.";
        addMessage("assistant", reply);
      } catch (err) {
        removeTypingIndicator();
        addMessage("assistant", "Network error — couldn't reach the assistant. Please check your connection.");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
